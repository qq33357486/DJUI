<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">DJUI 架构图</title>
  <desc id="desc">展示 Web Editor、UI 工程、StarEngine 工程和 Runtime 之间的关系。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155" />
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#0f172a" flood-opacity="0.14" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 32px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .card { stroke-width: 2; rx: 18; filter: url(#shadow); }
      .card-title { font: 700 22px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .card-subtitle { font: 600 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #475569; }
      .body { font: 400 15px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #334155; }
      .small { font: 400 13px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #64748b; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .label { font: 600 14px "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; fill: #0f172a; }
      .pill { rx: 14; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="560" />
  <text class="title" x="60" y="62">DJUI 的三段式架构</text>
  <text class="subtitle" x="60" y="94">网页编辑 UI，独立目录管理素材，StarEngine Runtime 在游戏里读取发布结果。</text>

  <rect class="card" x="60" y="155" width="290" height="235" fill="#ffffff" stroke="#38bdf8" />
  <circle cx="106" cy="205" r="28" fill="#e0f2fe" stroke="#38bdf8" stroke-width="2" />
  <text class="card-title" x="148" y="199">Web Editor</text>
  <text class="card-subtitle" x="148" y="223">浏览器里的编辑态</text>
  <text class="body" x="92" y="270">配置页面和模板</text>
  <text class="body" x="92" y="300">选择素材、动效、音效</text>
  <text class="body" x="92" y="330">保存 JSON，执行发布</text>

  <rect class="card" x="455" y="135" width="290" height="275" fill="#ffffff" stroke="#a78bfa" />
  <circle cx="501" cy="185" r="28" fill="#ede9fe" stroke="#a78bfa" stroke-width="2" />
  <text class="card-title" x="543" y="179">UI 工程目录</text>
  <text class="card-subtitle" x="543" y="203">需要自行备份的工作区</text>
  <text class="body" x="487" y="250">原始素材 / 临时文件</text>
  <text class="body" x="487" y="280">待审核素材 / 成品素材</text>
  <text class="body" x="487" y="310">AGENTS.md / 脚本区</text>
  <rect class="pill" x="487" y="340" width="210" height="34" fill="#f5f3ff" />
  <text class="small" x="510" y="362">只有成品素材会发布</text>

  <rect class="card" x="850" y="115" width="290" height="315" fill="#ffffff" stroke="#34d399" />
  <circle cx="896" cy="165" r="28" fill="#dcfce7" stroke="#34d399" stroke-width="2" />
  <text class="card-title" x="938" y="159">StarEngine 工程</text>
  <text class="card-subtitle" x="938" y="183">游戏真正运行的位置</text>
  <text class="body" x="882" y="230">src/DjuiRuntime/</text>
  <text class="body" x="882" y="260">ui/djui/pages/</text>
  <text class="body" x="882" y="290">ui/image/djui/</text>
  <text class="body" x="882" y="320">user_files/djui/</text>
  <rect class="pill" x="882" y="350" width="218" height="34" fill="#ecfdf5" />
  <text class="small" x="905" y="372">Runtime 读取发布结果</text>

  <path class="arrow" d="M350 240 C390 220, 415 220, 455 235" />
  <text class="label" x="368" y="211">浏览和引用素材</text>

  <path class="arrow" d="M745 250 C790 230, 810 210, 850 205" />
  <text class="label" x="760" y="201">发布成品素材</text>

  <path class="arrow" d="M350 315 C510 485, 760 495, 925 430" />
  <text class="label" x="520" y="486">同步 Runtime、页面 JSON、声音配置</text>

  <path class="arrow" d="M995 430 C995 475, 940 500, 875 478" />
  <text class="label" x="902" y="516">游戏运行时打开窗口</text>

  <rect x="60" y="455" width="650" height="54" rx="16" fill="#fff7ed" stroke="#fb923c" stroke-width="1.5" />
  <text class="body" x="86" y="488">关键边界：UI 工程负责素材工作流；StarEngine 工程负责 Runtime、页面 JSON 和最终运行文件。</text>
</svg>
